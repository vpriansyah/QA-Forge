version: '3.9'

# ═══════════════════════════════════════════════════════════
# QA Forge — Docker Compose (Development Override)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ═══════════════════════════════════════════════════════════

services:
  # ─── BACKEND (Dev Mode: Hot Reload) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    volumes:
      - ./backend/src:/app/src:delegated
      - ./backend/prisma:/app/prisma:delegated
      - ./shared:/app/shared:delegated
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    command: npx nodemon -L --watch src --ext ts,json --exec "npx tsx src/server.ts"

  # ─── FRONTEND (Dev Mode: Hot Reload) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/postcss.config.js:/app/postcss.config.js:delegated
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:delegated
      - ./frontend/next.config.js:/app/next.config.js:delegated
      - ./shared:/app/shared:delegated
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-4-26b-a4b-it}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://101.32.243.235:4000/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://101.32.243.235:4000}
    command: npm run dev

  # ─── PGADMIN (Dev Only) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qaforge-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@qaforge.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    depends_on:
      - postgres
    networks:
      - qaforge-network
    profiles:
      - debug

  # ─── BULLMQ DASHBOARD (Dev Only) ───────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: qaforge-bull-board
    ports:
      - "3100:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - qaforge-network
    profiles:
      - debug
