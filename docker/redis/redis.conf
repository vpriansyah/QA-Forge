# ═══════════════════════════════════════════════════════════
# QA Forge — Redis Configuration
# ═══════════════════════════════════════════════════════════

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# Append Only File
appendonly yes
appendfsync everysec

# Network
bind 0.0.0.0
protected-mode no
tcp-keepalive 300

# Logging
loglevel notice

# Performance
hz 10
dynamic-hz yes
